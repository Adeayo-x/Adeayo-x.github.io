<style>
* {
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #1f1f1f;
    background-color: #fafafa;
    margin: 0;
    padding: 60px 24px;
    line-height: 1.6;
}

/* Layout */
.main-container {
    max-width: 760px;
    margin: 0 auto;
}

/* Header */
h1 {
    font-size: 2.2rem;
    font-weight: 750;
    letter-spacing: -0.6px;
    margin: 0 0 6px 0;
    color: #111;
}

.email {
    font-size: 1rem;
    color: #444;
    margin-bottom: 14px;
}

.links a {
    color: #2563eb;
    text-decoration: none;
    margin-right: 14px;
    font-size: 0.98rem;
}

.links a:hover {
    text-decoration: underline;
}

/* Bio */
.bio-paragraph {
    margin-top: 10px;
    color: #333;
    font-size: 1.02rem;
    max-width: 70ch;
}

/* Sections */
h2 {
    margin-top: 48px;
    margin-bottom: 18px;
    font-size: 1.35rem;
    font-weight: 700;
    color: #111;
    letter-spacing: -0.3px;
}

/* EXPERIENCE CARD */
.experience-item {
    display: flex;
    gap: 16px;
    padding: 14px 0;
}

.company-logo {
    width: 42px;
    height: 42px;
    flex-shrink: 0;
    border-radius: 6px;
    margin-top: 2px;
}

.item-content {
    flex: 1;
}

.item-title {
    font-size: 1.05rem;
    font-weight: 650;
    margin: 0;
    color: #111;
}

.item-subtitle {
    font-size: 0.95rem;
    color: #555;
    margin: 2px 0 6px 0;
}

.item-description {
    font-size: 0.98rem;
    color: #333;
    margin: 0;
    max-width: 75ch;
}

/* LIST BLOCKS (Publications, Projects, Teaching) */
.list-block {
    margin-bottom: 20px;
}

.list-block h3 {
    margin: 0 0 4px 0;
    font-size: 1.02rem;
    font-weight: 650;
}

.meta-line {
    font-size: 0.95rem;
    color: #555;
    margin-bottom: 4px;
}

.additional-details {
    font-size: 0.95rem;
    color: #444;
}

/* LINKS */
a {
    color: #2563eb;
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}

/* FOOTER */
footer {
    margin-top: 70px;
    font-size: 0.85rem;
    color: #777;
}

/* RESUME BUTTON FIX */
.pdf-badge {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 48px;
    height: 48px;
    background: white;
    border: 1px solid #e5e5e5;
    border-radius: 999px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    transition: transform 0.15s ease;
}

.pdf-badge:hover {
    transform: scale(1.05);
}
</style>
